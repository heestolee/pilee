name: cron-only

on:
  schedule:
    # Minimal schedule-only workflow to isolate GitHub schedule registration/dispatch.
    - cron: "*/5 * * * *"
      timezone: "Asia/Seoul"

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    permissions:
      contents: read

    steps:
      - name: Print time
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "schedule=${{ github.event.schedule }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"
          echo "utc_now=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          echo "kst_now=$(TZ=Asia/Seoul date +'%Y-%m-%dT%H:%M:%S%z')"
