name: "pilee knowledge sync"

on:
  schedule:
    # KST 02:13 / 02:43 / 03:13. Multiple windows reduce GitHub schedule drop risk.
    - cron: "13 17 * * *"
    - cron: "43 17 * * *"
    - cron: "13 18 * * *"
  workflow_dispatch:

concurrency:
  group: pilee-knowledge-sync
  cancel-in-progress: false

jobs:
  knowledge-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture sync context
        id: context
        shell: bash
        run: |
          KST_DATE=$(TZ=Asia/Seoul date +%F)
          SINCE_UTC=$(TZ=Asia/Seoul date -d "$KST_DATE 00:00:00" -u +"%Y-%m-%dT%H:%M:%SZ")
          COUNT=$(git log --since="$SINCE_UTC" --format=%H -- . ':(exclude)docs/knowledge-review.md' | wc -l | tr -d ' ')

          echo "kst_date=$KST_DATE" >> "$GITHUB_OUTPUT"
          echo "since_utc=$SINCE_UTC" >> "$GITHUB_OUTPUT"
          echo "recent_commit_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "reason=manual workflow_dispatch" >> "$GITHUB_OUTPUT"
          else
            echo "reason=$COUNT commit(s) since $KST_DATE 00:00 KST; freshness is evaluated regardless of commit count" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh generated knowledge graph
        run: npm run knowledge:graph

      - name: Validate knowledge docs
        run: npm run knowledge:validate

      - name: Collect freshness report
        run: |
          node scripts/knowledge.mjs --freshness --json > /tmp/pilee-knowledge-freshness.json
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/pilee-knowledge-freshness.json', 'utf8'));
          const translateActionReason = (reason) => ({
            'related commit/history evidence found': '관련 커밋/히스토리 근거가 발견됨',
            'confidence is medium; user review requested': 'confidence가 medium이라 사용자 검토 필요',
            'confidence is low; user review requested': 'confidence가 low라 사용자 검토 필요',
          }[reason] || reason);
          console.log('## pilee knowledge freshness');
          console.log('');
          console.log(`실행 이유: ${process.env.RECENT_REASON || 'repository changed'}`);
          console.log(`전체 상태: ${data.summary.status === 'fresh' ? '✅ fresh' : '⚠️ stale / 검토 필요'}`);
          console.log(`Knowledge 문서: 총 ${data.doctrine_freshness.total}개 · ✅ fresh ${data.doctrine_freshness.fresh}개 · ⚠️ stale/review_needed ${data.doctrine_freshness.review_needed}개 · ❓ unreviewed ${data.doctrine_freshness.unreviewed}개`);
          console.log(`README coverage: ${data.readme.coverage.covered_count}/${data.readme.coverage.total}`);
          console.log(`자동 수정 action: ${data.deterministic_actions.length}개`);
          console.log(`AI/사람 검토 action: ${data.ai_actions.length}개`);
          console.log('');
          if (data.ai_actions.length) {
            console.log('| 대상 | 이유 |');
            console.log('|---|---|');
            for (const action of data.ai_actions) console.log(`| ${action.doc || action.target} | ${translateActionReason(action.reason)} |`);
            console.log('');
            console.log('Private/local journal은 GitHub Actions에서 의도적으로 읽지 않습니다. 공개 가능한 변경은 로컬에서 `npm run knowledge:freshness`로 확인한 뒤 sanitized commit으로 올립니다.');
          }
          NODE
        env:
          RECENT_REASON: ${{ steps.context.outputs.reason }}
          SINCE_UTC: ${{ steps.context.outputs.since_utc }}
          KST_DATE: ${{ steps.context.outputs.kst_date }}

      - name: Render public review queue
        id: review_queue
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const path = 'docs/knowledge-review.md';
          const data = JSON.parse(fs.readFileSync('/tmp/pilee-knowledge-freshness.json', 'utf8'));

          const ROOT_LINKS_START = '<!-- PILEE_ROOT_KNOWLEDGE_LINKS_START -->';
          const ROOT_LINKS_END = '<!-- PILEE_ROOT_KNOWLEDGE_LINKS_END -->';
          const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const stripGeneratedReadme = (content) => String(content || '')
            .replace(/\r\n/g, '\n')
            .replace(
              new RegExp(`${escapeRegex(ROOT_LINKS_START)}[\\s\\S]*?${escapeRegex(ROOT_LINKS_END)}`),
              `${ROOT_LINKS_START}\n<generated knowledge links>\n${ROOT_LINKS_END}`,
            )
            .trim();
          const git = (args) => execFileSync('git', args, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] }).trim();
          const readGitFile = (commit, file) => {
            try { return git(['show', `${commit}:${file}`]); }
            catch { return ''; }
          };
          const currentReadme = fs.existsSync('README.md') ? fs.readFileSync('README.md', 'utf8') : '';
          const sinceUtc = process.env.SINCE_UTC || '';
          let baseCommit = '';
          try { if (sinceUtc) baseCommit = git(['rev-list', '-1', `--before=${sinceUtc}`, 'HEAD']); } catch {}
          const baseReadme = baseCommit ? readGitFile(baseCommit, 'README.md') : '';
          const readmeNarrativeChanged = Boolean(baseReadme && stripGeneratedReadme(baseReadme) !== stripGeneratedReadme(currentReadme));

          const hasActions = data.deterministic_actions.length > 0 || data.ai_actions.length > 0 || readmeNarrativeChanged;
          const manualReviewRequired = data.ai_actions.length > 0 || readmeNarrativeChanged;
          if (process.env.GITHUB_OUTPUT) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_review_actions=${hasActions}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `manual_review_required=${manualReviewRequired}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `summary_status=${data.summary.status}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `doctrine_total=${data.doctrine_freshness.total}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `doctrine_fresh=${data.doctrine_freshness.fresh}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `doctrine_review_needed=${data.doctrine_freshness.review_needed}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `doctrine_unreviewed=${data.doctrine_freshness.unreviewed}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `readme_coverage=${data.readme.coverage.covered_count}/${data.readme.coverage.total}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `deterministic_actions=${data.deterministic_actions.length}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `ai_actions=${data.ai_actions.length}\n`);
          }
          if (!hasActions) {
            if (fs.existsSync(path)) fs.unlinkSync(path);
            process.exit(0);
          }

          const translateActionReason = (reason) => ({
            'related commit/history evidence found': '관련 커밋/히스토리 근거가 발견됨',
            'confidence is medium; user review requested': 'confidence가 medium이라 사용자 검토 필요',
            'confidence is low; user review requested': 'confidence가 low라 사용자 검토 필요',
          }[reason] || reason);
          const translateReasonType = (type) => ({
            recent_commit: '관련 커밋',
            confidence_review: 'confidence 검토',
          }[type] || type);
          const translateReasonDetail = (detail) => String(detail || '')
            .replace('confidence is medium; keep in review queue until user/AI review promotes it', 'confidence가 medium입니다. 사용자/AI 검토 후 승격될 때까지 review queue에 유지합니다.')
            .replace('confidence is low; keep in review queue until user/AI review promotes it', 'confidence가 low입니다. 사용자/AI 검토 후 승격될 때까지 review queue에 유지합니다.');
          const countBy = (items, keyFn) => {
            const counts = new Map();
            for (const item of items) {
              const key = keyFn(item);
              counts.set(key, (counts.get(key) || 0) + 1);
            }
            return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
          };

          const docsById = new Map((data.doctrine || []).map((doc) => [doc.id, doc]));
          const docReviewActions = data.ai_actions.filter((action) => action.doc);
          const nonDocReviewActions = data.ai_actions.filter((action) => !action.doc);
          const reasonCounts = countBy(data.ai_actions, (action) => translateActionReason(action.reason));
          const lines = [];
          lines.push('# pilee knowledge 검토 큐');
          lines.push('');
          lines.push('> daily knowledge sync workflow가 생성한 공개 검토 큐입니다. 직접 수정하지 말고, 연결된 문서를 검토한 뒤 후속 커밋에서 confidence/review metadata를 갱신하세요.');
          lines.push('');
          lines.push('## 검토 현황');
          lines.push('');
          lines.push('> `stale`은 문서가 틀렸다는 확정이 아니라, `reviewed_commit` 이후 관련 변경이 있어 현재 HEAD와 동기화됐다고 아직 확인할 수 없다는 뜻입니다. 문서를 읽고 내용이 맞으면 `--confirm`, 다르면 수정 후 `--confirm`으로 해소합니다.');
          lines.push('');
          lines.push('| 항목 | 값 | 의미 |');
          lines.push('|---|---:|---|');
          lines.push(`| 기준 커밋 | ${data.base.head_short} | 이 커밋 기준으로 freshness를 계산했습니다. |`);
          lines.push(`| 전체 상태 | ${data.summary.status === 'fresh' ? '✅ fresh' : '⚠️ stale / 검토 필요'} | 검토 action이 남아 있으면 전체 상태는 stale입니다. |`);
          lines.push(`| Knowledge 문서 | ${data.doctrine_freshness.total}개 | active/deprecated doctrine 전체 수 |`);
          lines.push(`| Fresh 문서 | ✅ ${data.doctrine_freshness.fresh}개 | 현재 HEAD 기준 검토 완료 |`);
          lines.push(`| Stale / review_needed 문서 | ⚠️ ${data.doctrine_freshness.review_needed}개 | 재검토가 필요하지만 틀렸다고 확정된 것은 아님 |`);
          lines.push(`| Unknown / unreviewed 문서 | ❓ ${data.doctrine_freshness.unreviewed}개 | reviewed_commit 기준점 없음 |`);
          lines.push(`| README coverage | ${data.readme.coverage.covered_count}/${data.readme.coverage.total} | surface와 knowledge 문서 연결 상태 |`);
          lines.push(`| 자동 수정 action | ${data.deterministic_actions.length}개 | generated block 재생성처럼 기계적으로 처리 가능한 항목 |`);
          lines.push(`| AI/사람 검토 action | ${data.ai_actions.length}개 | 문서 의미를 읽고 판단해야 하는 항목 |`);
          lines.push('');

          if (data.ai_actions.length) {
            lines.push('## 검토 사유 요약');
            lines.push('');
            lines.push('| 사유 | 개수 |');
            lines.push('|---|---:|');
            for (const [reason, count] of reasonCounts) lines.push(`| ${reason} | ${count}개 |`);
            lines.push('');
          }

          if (docReviewActions.length) {
            lines.push(`## Stale / review_needed 문서 ${data.doctrine_freshness.review_needed}개`);
            lines.push('');
            lines.push('| 문서 | confidence | 검토 사유 | 근거 요약 |');
            lines.push('|---|---|---|---|');
            for (const action of docReviewActions) {
              const target = action.doc;
              const doc = docsById.get(target);
              const detail = doc?.reasons?.map((reason) => `${translateReasonType(reason.type)}: ${translateReasonDetail(reason.detail)}`).join('<br>') || '';
              const link = `[${target}](./knowledge/${target}.md)`;
              lines.push(`| ${link} | ${doc?.confidence || 'high'} | ${translateActionReason(action.reason)} | ${detail.replace(/\|/g, '\\|')} |`);
            }
            lines.push('');
          }

          if (nonDocReviewActions.length) {
            lines.push('## 기타 AI / 사람 검토 action');
            lines.push('');
            lines.push('| 대상 | 이유 |');
            lines.push('|---|---|');
            for (const action of nonDocReviewActions) lines.push(`| ${action.target || action.doc} | ${translateActionReason(action.reason)} |`);
            lines.push('');
          }

          if (readmeNarrativeChanged) {
            lines.push('## README 공개 서사 검토');
            lines.push('');
            lines.push('| 대상 | 이유 | 권장 검토 |');
            lines.push('|---|---|---|');
            lines.push(`| [README.md](../README.md) | ${process.env.KST_DATE || '오늘'} KST 이후 generated block이 아닌 README 내용이 변경됨 | 철학, 포지셔닝, public-facing 문구가 owner 의도와 맞는지 확인하세요. Generated knowledge table 변경은 이 검토에서 제외됩니다. |`);
            lines.push('');
          }

          if (data.deterministic_actions.length) {
            lines.push('## Deterministic action');
            lines.push('');
            for (const action of data.deterministic_actions) {
              lines.push(`- ${action.type}: ${action.command || action.file} — ${action.reason}`);
            }
            lines.push('');
          }

          lines.push('## confidence 검토 항목 해소 방법');
          lines.push('');
          lines.push('medium/low confidence 문서를 받아들이기로 했다면 다음 명령을 실행하세요:');
          lines.push('');
          lines.push('```bash');
          lines.push('node scripts/knowledge.mjs --confirm <doc-id> --confidence high');
          lines.push('```');
          lines.push('');
          fs.writeFileSync(path, `${lines.join('\n')}\n`);
          NODE

      - name: Create PR for knowledge review queue
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/pilee-knowledge-sync
          delete-branch: true
          title: "[AUTO] pilee knowledge 검토 큐"
          commit-message: "chore: render pilee knowledge review queue"
          body: |
            ## 이번 실행 요약
            - 전체 상태: `${{ steps.review_queue.outputs.summary_status }}`
            - Knowledge 문서: 총 `${{ steps.review_queue.outputs.doctrine_total }}`개 / fresh `${{ steps.review_queue.outputs.doctrine_fresh }}`개 / stale·review_needed `${{ steps.review_queue.outputs.doctrine_review_needed }}`개 / unreviewed `${{ steps.review_queue.outputs.doctrine_unreviewed }}`개
            - README coverage: `${{ steps.review_queue.outputs.readme_coverage }}`
            - 자동 수정 action: `${{ steps.review_queue.outputs.deterministic_actions }}`개
            - AI/사람 검토 action: `${{ steps.review_queue.outputs.ai_actions }}`개

            `stale`은 문서가 틀렸다는 확정이 아니라, 현재 HEAD 기준으로 다시 읽고 확인해야 한다는 뜻입니다. 상세 목록은 `docs/knowledge-review.md`에 한국어 검토 큐로 생성됩니다.

            ## 개요
            pilee knowledge review queue workflow가 생성한 자동 PR입니다.

            이 PR은 stale/review_needed 문서를 직접 수정하는 PR이 아니라, 로컬 resolver가 실제 문서 갱신 PR을 만들 수 있도록 공개 검토 큐를 갱신합니다.

            이 PR에는 다음 변경이 포함될 수 있습니다.
            - `docs/knowledge/README.md`와 root `README.md`의 deterministic generated block 갱신
            - stale 또는 medium/low confidence doctrine에 대한 공개 `docs/knowledge-review.md` 검토 큐
            - generated block이 아닌 README 공개 서사가 바뀐 경우의 수동 검토 요청

            Private/local journal은 GitHub Actions에서 의도적으로 읽지 않습니다. 실제 stale 해소는 로컬에서 session/private history 맥락을 확인한 뒤 sanitized 문서 수정 또는 `--confirm`으로 처리하세요.
          add-paths: |
            docs/knowledge/README.md
            README.md
            docs/knowledge-review.md

      - name: Auto-merge generated-only knowledge PR
        if: steps.cpr.outputs.pull-request-number != '' && steps.review_queue.outputs.manual_review_required != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          if gh pr merge "$PR_NUMBER" --squash --delete-branch --auto; then
            echo "Generated-only PR #$PR_NUMBER auto-merge를 활성화했습니다." >> "$GITHUB_STEP_SUMMARY"
          elif gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "Generated-only PR #$PR_NUMBER 를 즉시 병합했습니다." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Generated-only PR #$PR_NUMBER 자동 병합에 실패해 열린 상태로 둡니다."
            echo "Generated-only PR #$PR_NUMBER 자동 병합에 실패해 열린 상태로 둡니다." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Keep knowledge review queue PR open
        if: steps.cpr.outputs.pull-request-number != '' && steps.review_queue.outputs.manual_review_required == 'true'
        run: |
          echo "## 수동 knowledge 검토 필요" >> "$GITHUB_STEP_SUMMARY"
          echo "PR #${{ steps.cpr.outputs.pull-request-number }} 에 AI/사람 검토 action 또는 README 서사 검토가 포함되어 검토 큐 PR로 남겼습니다." >> "$GITHUB_STEP_SUMMARY"
