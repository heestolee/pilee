name: "pilee knowledge sync"

on:
  schedule:
    # KST 02:13 / 02:43 / 03:13. Multiple windows reduce GitHub schedule drop risk.
    - cron: "13 17 * * *"
    - cron: "43 17 * * *"
    - cron: "13 18 * * *"
  workflow_dispatch:

concurrency:
  group: pilee-knowledge-sync
  cancel-in-progress: false

jobs:
  knowledge-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Capture sync context
        id: context
        shell: bash
        run: |
          KST_DATE=$(TZ=Asia/Seoul date +%F)
          SINCE_UTC=$(TZ=Asia/Seoul date -d "$KST_DATE 00:00:00" -u +"%Y-%m-%dT%H:%M:%SZ")
          COUNT=$(git log --since="$SINCE_UTC" --format=%H -- . ':(exclude)docs/knowledge-review.md' | wc -l | tr -d ' ')

          echo "kst_date=$KST_DATE" >> "$GITHUB_OUTPUT"
          echo "since_utc=$SINCE_UTC" >> "$GITHUB_OUTPUT"
          echo "recent_commit_count=$COUNT" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "reason=manual workflow_dispatch" >> "$GITHUB_OUTPUT"
          else
            echo "reason=$COUNT commit(s) since $KST_DATE 00:00 KST; freshness is evaluated regardless of commit count" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh generated knowledge graph
        run: npm run knowledge:graph

      - name: Validate knowledge docs
        run: npm run knowledge:validate

      - name: Collect freshness report
        run: |
          node scripts/knowledge.mjs --freshness --json > /tmp/pilee-knowledge-freshness.json
          node <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('fs');
          const data = JSON.parse(fs.readFileSync('/tmp/pilee-knowledge-freshness.json', 'utf8'));
          console.log('## pilee knowledge freshness');
          console.log('');
          console.log(`Reason: ${process.env.RECENT_REASON || 'repository changed'}`);
          console.log(`Doctrine: ${data.doctrine_freshness.fresh} fresh / ${data.doctrine_freshness.review_needed} review_needed / ${data.doctrine_freshness.unreviewed} unreviewed`);
          console.log(`README coverage: ${data.readme.coverage.covered_count}/${data.readme.coverage.total}`);
          console.log(`Deterministic actions: ${data.deterministic_actions.length}`);
          console.log(`AI/human actions: ${data.ai_actions.length}`);
          console.log('');
          if (data.ai_actions.length) {
            console.log('| Target | Reason |');
            console.log('|---|---|');
            for (const action of data.ai_actions) console.log(`| ${action.doc || action.target} | ${action.reason} |`);
            console.log('');
            console.log('Private/local journal is intentionally not available in GitHub Actions. Local AI-assisted content sync can use `npm run knowledge:freshness` before pushing sanitized changes.');
          }
          NODE
        env:
          RECENT_REASON: ${{ steps.context.outputs.reason }}
          SINCE_UTC: ${{ steps.context.outputs.since_utc }}
          KST_DATE: ${{ steps.context.outputs.kst_date }}

      - name: Render public review queue
        id: review_queue
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');
          const path = 'docs/knowledge-review.md';
          const data = JSON.parse(fs.readFileSync('/tmp/pilee-knowledge-freshness.json', 'utf8'));

          const ROOT_LINKS_START = '<!-- PILEE_ROOT_KNOWLEDGE_LINKS_START -->';
          const ROOT_LINKS_END = '<!-- PILEE_ROOT_KNOWLEDGE_LINKS_END -->';
          const escapeRegex = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          const stripGeneratedReadme = (content) => String(content || '')
            .replace(/\r\n/g, '\n')
            .replace(
              new RegExp(`${escapeRegex(ROOT_LINKS_START)}[\\s\\S]*?${escapeRegex(ROOT_LINKS_END)}`),
              `${ROOT_LINKS_START}\n<generated knowledge links>\n${ROOT_LINKS_END}`,
            )
            .trim();
          const git = (args) => execFileSync('git', args, { encoding: 'utf8', stdio: ['ignore', 'pipe', 'ignore'] }).trim();
          const readGitFile = (commit, file) => {
            try { return git(['show', `${commit}:${file}`]); }
            catch { return ''; }
          };
          const currentReadme = fs.existsSync('README.md') ? fs.readFileSync('README.md', 'utf8') : '';
          const sinceUtc = process.env.SINCE_UTC || '';
          let baseCommit = '';
          try { if (sinceUtc) baseCommit = git(['rev-list', '-1', `--before=${sinceUtc}`, 'HEAD']); } catch {}
          const baseReadme = baseCommit ? readGitFile(baseCommit, 'README.md') : '';
          const readmeNarrativeChanged = Boolean(baseReadme && stripGeneratedReadme(baseReadme) !== stripGeneratedReadme(currentReadme));

          const hasActions = data.deterministic_actions.length > 0 || data.ai_actions.length > 0 || readmeNarrativeChanged;
          const manualReviewRequired = data.ai_actions.length > 0 || readmeNarrativeChanged;
          if (process.env.GITHUB_OUTPUT) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `has_review_actions=${hasActions}\n`);
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `manual_review_required=${manualReviewRequired}\n`);
          }
          if (!hasActions) {
            if (fs.existsSync(path)) fs.unlinkSync(path);
            process.exit(0);
          }

          const docsById = new Map((data.doctrine || []).map((doc) => [doc.id, doc]));
          const lines = [];
          lines.push('# pilee knowledge review queue');
          lines.push('');
          lines.push('> Generated by the daily knowledge sync workflow. Do not edit manually; review the linked docs and update confidence/review metadata in follow-up commits.');
          lines.push('');
          lines.push(`- Base: ${data.base.head_short}`);
          lines.push(`- Summary: ${data.summary.status}`);
          lines.push(`- README coverage: ${data.readme.coverage.covered_count}/${data.readme.coverage.total}`);
          lines.push('');

          if (data.ai_actions.length) {
            lines.push('## AI / human review actions');
            lines.push('');
            lines.push('| Target | Reason | Detail |');
            lines.push('|---|---|---|');
            for (const action of data.ai_actions) {
              const target = action.doc || action.target;
              const doc = docsById.get(target);
              const detail = doc?.reasons?.map((reason) => `${reason.type}: ${reason.detail}`).join('<br>') || '';
              const link = action.doc ? `[${target}](./knowledge/${target}.md)` : target;
              lines.push(`| ${link} | ${action.reason} | ${detail.replace(/\|/g, '\\|')} |`);
            }
            lines.push('');
          }

          if (readmeNarrativeChanged) {
            lines.push('## README public narrative review');
            lines.push('');
            lines.push('| Target | Reason | Suggested review |');
            lines.push('|---|---|---|');
            lines.push(`| [README.md](../README.md) | Non-generated README content changed since ${process.env.KST_DATE || 'today'} KST | Confirm philosophy, positioning, and public-facing wording reflect owner intent. Generated knowledge table changes are ignored for this check. |`);
            lines.push('');
          }

          if (data.deterministic_actions.length) {
            lines.push('## Deterministic actions');
            lines.push('');
            for (const action of data.deterministic_actions) {
              lines.push(`- ${action.type}: ${action.command || action.file} — ${action.reason}`);
            }
            lines.push('');
          }

          lines.push('## How to clear confidence review items');
          lines.push('');
          lines.push('If a medium/low confidence doc is accepted, run:');
          lines.push('');
          lines.push('```bash');
          lines.push('node scripts/knowledge.mjs --confirm <doc-id> --confidence high');
          lines.push('```');
          lines.push('');
          fs.writeFileSync(path, `${lines.join('\n')}\n`);
          NODE

      - name: Create PR for knowledge sync updates
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto/pilee-knowledge-sync
          delete-branch: true
          title: "[AUTO] pilee knowledge 정합성 갱신"
          commit-message: "chore: sync pilee knowledge review state"
          body: |
            ## Overview
            Automated knowledge consistency sync for days with repository changes.

            This PR may include:
            - deterministic generated blocks in `docs/knowledge/README.md` and root `README.md`
            - public `docs/knowledge-review.md` review queue for stale or medium/low confidence doctrine
            - README public narrative review when non-generated README content changed

            Private/local journal is intentionally not available in GitHub Actions. Content changes that require private context should be done locally, sanitized, and reviewed before pushing.
          add-paths: |
            docs/knowledge/README.md
            README.md
            docs/knowledge-review.md

      - name: Auto-merge generated-only knowledge sync PR
        if: steps.cpr.outputs.pull-request-number != '' && steps.review_queue.outputs.manual_review_required != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          if gh pr merge "$PR_NUMBER" --squash --delete-branch --auto; then
            echo "Auto-merge enabled for generated-only PR #$PR_NUMBER" >> "$GITHUB_STEP_SUMMARY"
          elif gh pr merge "$PR_NUMBER" --squash --delete-branch; then
            echo "Generated-only PR #$PR_NUMBER merged immediately" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Could not auto-merge generated-only PR #$PR_NUMBER; leaving it open."
            echo "Could not auto-merge generated-only PR #$PR_NUMBER; leaving it open." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Keep manual review PR open
        if: steps.cpr.outputs.pull-request-number != '' && steps.review_queue.outputs.manual_review_required == 'true'
        run: |
          echo "## Manual knowledge review required" >> "$GITHUB_STEP_SUMMARY"
          echo "PR #${{ steps.cpr.outputs.pull-request-number }} includes AI/human review actions or README narrative review and was left open for manual merge." >> "$GITHUB_STEP_SUMMARY"
